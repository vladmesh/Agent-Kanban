server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Proxy API calls to the api service (same-origin for the browser).
  location /api/ {
    proxy_pass         http://api:4000;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location / {
    try_files $uri $uri/ /index.html;

    # No build step → asset filenames (app.jsx, styles.css, …) are unversioned,
    # so browsers must revalidate or a deploy won't show until the heuristic
    # cache expires. "no-cache" = always revalidate; nginx's ETag/Last-Modified
    # make the revalidation a cheap 304 when nothing changed, and serve the new
    # bytes immediately after a deploy.
    add_header Cache-Control "no-cache" always;
  }
}
